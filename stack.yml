services:
  wakapi:
    image: ${WAKAPI_IMAGE_REPO:-ghcr.io/salesadriano/wakapi}:${WAKAPI_IMAGE_TAG:-latest}
    init: true
    stop_grace_period: 30s
    ports:
      - target: 3000
        published: ${WAKAPI_PORT:-3000}
        protocol: tcp
        mode: ingress
    environment:
      # See README.md and config.default.yml for all config options
      WAKAPI_DB_TYPE: "postgres"
      WAKAPI_DB_NAME: "wakapi"
      WAKAPI_DB_USER: "wakapi"
      WAKAPI_DB_HOST: "db"
      WAKAPI_DB_PORT: "5432"
      WAKAPI_DB_PASSWORD: "${WAKAPI_DB_PASSWORD:-changeme}"
      WAKAPI_PASSWORD_SALT: "${WAKAPI_PASSWORD_SALT:-changeme}"
      WAKAPI_MAIL_SMTP_PASS: "${WAKAPI_MAIL_SMTP_PASS:-}"
    volumes:
      - wakapi-data:/data
    networks:
      - wakapi
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first
      restart_policy:
        condition: on-failure

  db:
    image: postgres:17
    stop_grace_period: 60s
    environment:
      POSTGRES_USER: "wakapi"
      POSTGRES_PASSWORD: "${WAKAPI_DB_PASSWORD:-changeme}"
      POSTGRES_DB: "wakapi"
    volumes:
      - wakapi-db-data:/var/lib/postgresql/data
    networks:
      - wakapi
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

volumes:
  wakapi-data: {}
  wakapi-db-data: {}

networks:
  wakapi: {}